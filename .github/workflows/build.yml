name: Build KeePassium IPA

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许你手动点击按钮触发编译

jobs:
  build:
    runs-on: macos-26 # 使用 GitHub 提供的最新 macOS 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0.1" # 或者 'latest'

      - name: Install Dependencies
        run: |
          # 如果项目用了 CocoaPods 或 Swift Package Manager，在这里安装
          # KeePassium 主要是原生处理，可能需要跑一些脚本

      - name: Build
        run: |
          xcodebuild archive \
            -workspace KeePassium.xcworkspace \
            -scheme KeePassium \
            -configuration Release \
            -archivePath ./build/KeePassium.xcarchive \
            -destination 'generic/platform=iOS'
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          # 将编译出的 app 文件夹打包成 ipa
          mkdir -p payload/Payload
          cp -r ./build/KeePassium.xcarchive/Products/Applications/KeePassium.app payload/Payload/
          cd payload && zip -r ../KeePassium.ipa .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeePassium-Unsigned-IPA
          path: KeePassium.ipa
