name: Build KeePassium IPA

on:
  push:
    branches:
      - master
  workflow_dispatch: # 允许你手动点击按钮触发编译

jobs:
  build:
    runs-on: macos-15 # 使用 GitHub 提供的最新 macOS 环境
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # 镜像文档显示 Xcode 26.4 可用，且包含 iOS 26.4 SDK
          xcode-version: "26.3"

      - name: Build Archive
        run: |
          # 关键点：明确指定 -destination 为 iOS 平台
          # 这会让 Xcode 自动过滤掉带有 maccatalyst 过滤器的 MacUtils 依赖
          xcodebuild archive \
            -workspace KeePassium.xcworkspace \
            -scheme KeePassium \
            -configuration Release \
            -archivePath ./build/KeePassium.xcarchive \
            -destination "generic/platform=iOS" \
            SDKROOT=iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export Unsigned IPA
        run: |
          # 针对 iOS 结构的正确打包逻辑
          mkdir -p payload/Payload
          # 寻找编译出的 .app 文件并拷贝
          APP_PATH=$(find ./build/KeePassium.xcarchive -name "*.app" | head -n 1)
          cp -r "$APP_PATH" payload/Payload/
          cd payload && zip -r ../KeePassium.ipa .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeePassium-iOS-Unsigned
          path: KeePassium.ipa
